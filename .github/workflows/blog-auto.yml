name: Auto Blog Generation

on:
  schedule:
    # 매일 오전 9시 (KST) = UTC 0시
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 새 글 1개 생성
      - name: Generate new blog post
        run: npx tsx scripts/generate-blog.ts --count 1

      # 기존 글 3개 고도화
      - name: Enhance existing posts
        run: npx tsx scripts/enhance-blog.ts --count 3

      # 변경사항이 있으면 커밋 & 푸시
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/posts/
          if git diff --staged --quiet; then
            echo "No new posts generated"
          else
            git commit -m "blog: auto-generate daily post + enhance 3 posts"
            git push
          fi
